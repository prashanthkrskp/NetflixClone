<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <nav>
            <img src="/image/netflix.svg" alt="NETFLIX">
            <div class="btn">
                <select name="" id="lang">
                    <option value="">English</option>
                    <option value="">Kannada</option>
                </select>
                <button class="sign">Sign Up</button>
            </div>
        </nav>
        <div class="textcontainer">
            <div class="uppertext">

                <h1>
                    Unlimited movies,
                </h1>
                <h1>
                    shows, and more
                </h1>
                <p class="small">
                    Starts at ₹149. Cancel at any time.
                </p >
                <p class="small" >Ready to watch? Enter your email to create or restart your membership.</p>
                <div class="inside">

                    <span >
                        <input id="imail" type="email" name="" id="mail" placeholder="Enter Email">
                    </span>
                    
                    <button id="btn">GET START ></button>
                </div>
                
            </div>
        </div>
    </div>
    <div class="curve">
<svg viewBox="0 0 1440 120" preserveAspectRatio="none">
  <path d="M0,100 C300,0 1140,0 1440,100 L1440,120 L0,120 Z"></path>
</svg>
</div>
<div class="section">
    <div>

        <h1>Trending Now</h1>
    </div>
    <div class="card">
        <div class="topten 1">
            <img src="/image/movpic1.webp" alt="">
        </div>
        <div class="topten 2">
            <img src="/image/povpic2.webp" alt="">
        </div>
        <div class="topten 3">
            <img src="/image/movpic3.webp" alt="">
        </div>
        <div class="topten 4">
            <img src="/image/movpic4.webp" alt="">
        </div>
        <div class="topten 5">
            <img src="/image/movpic5.webp" alt="">
        </div>
        <div class="topten 6">
            <img src="/image/movpic6.webp" alt="">
        </div>
        <div class="topten 7">
            <img src="/image/movpic7.webp" alt="">
        </div>
        <div class="topten 8">
            <img src="/image/movpic8.webp" alt="">
        </div>
        <div class="topten 9">
            <img src="/image/movpic9.webp" alt="">
        </div>
        <div class="topten 10">
            <img src="/image/movpic10.webp" alt="">
        </div>
    </div>
</div>
